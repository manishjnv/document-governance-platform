# T-1015: Kubernetes ConfigMap for application configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: edgp-api-config
  namespace: edgp-prod
data:
  LOG_LEVEL: "info"
  CORS_ORIGINS: "https://edgp.example.com,https://app.edgp.example.com"
  ALLOWED_HOSTS: "edgp.example.com,api.edgp.example.com"
  STORAGE_TYPE: "s3"  # or "azure" for production
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DATABASE_HOST: "postgres.edgp-prod.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "edgp_prod"
  REDIS_HOST: "redis.edgp-prod.svc.cluster.local"
  REDIS_PORT: "6379"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: edgp-prod
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
      use epoll;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      client_max_body_size 50M;

      # Rate limiting
      limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
      limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

      # Upstream API
      upstream api {
        least_conn;
        server edgp-api.edgp-prod.svc.cluster.local:8000 max_fails=3 fail_timeout=30s;
      }

      # Upstream Web
      upstream web {
        least_conn;
        server edgp-web.edgp-prod.svc.cluster.local:3000 max_fails=3 fail_timeout=30s;
      }

      # HTTPS redirect
      server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
      }

      # HTTPS server
      server {
        listen 443 ssl http2;
        server_name edgp.example.com *.edgp.example.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # API routes
        location /api/ {
          limit_req zone=api_limit burst=200 nodelay;

          proxy_pass http://api;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_cache_bypass $http_upgrade;

          # Timeouts for long-running reviews
          proxy_connect_timeout 60s;
          proxy_send_timeout 300s;
          proxy_read_timeout 300s;
        }

        # Auth routes (stricter rate limit)
        location /api/v1/auth/ {
          limit_req zone=auth_limit burst=10 nodelay;
          proxy_pass http://api;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web routes
        location / {
          proxy_pass http://web;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection 'upgrade';
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint
        location /health {
          access_log off;
          proxy_pass http://api;
        }
      }
    }
