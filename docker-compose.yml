version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: edgp-postgres
    environment:
      POSTGRES_USER: edgp_user
      POSTGRES_PASSWORD: edgp_password
      POSTGRES_DB: edgp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgp_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: edgp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend (development only)
  # Comment out if running locally with `uvicorn main:app --reload`
  # api:
  #   build:
  #     context: ./apps/api
  #     dockerfile: Dockerfile.dev
  #   container_name: edgp-api
  #   environment:
  #     DATABASE_URL: postgresql://edgp_user:edgp_password@postgres:5432/edgp_dev
  #     REDIS_URL: redis://redis:6379
  #     CLAUDE_API_KEY: ${CLAUDE_API_KEY}
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./apps/api:/app
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # Nginx Reverse Proxy (optional, for production-like setup)
  # nginx:
  #   image: nginx:latest
  #   container_name: edgp-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: edgp-network
